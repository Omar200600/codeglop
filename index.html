<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>مشروع فيلا المستقبل - المهندس عمر حسن</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene shadow="type: pcfsoft" globe-controls>
      
      <a-assets>
        <a-asset-item id="villaModel" src="https://raw.githubusercontent.com/Omar200600/codeglop/68ae055b02203f231f1401bd88d30c9e59ef7de6/villa.glb"></a-asset-item>
        
        <a-asset-item id="assistantModel" src="https://raw.githubusercontent.com/Omar200600/codeglop/68ae055b02203f231f1401bd88d30c9e59ef7de6/assistant.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#villaModel" 
                position="0 0 0" 
                scale="1 1 1">
      </a-entity>

      <a-entity gltf-model="#assistantModel" 
                position="2.5 0 -4" 
                scale="1.5 1.5 1.5" 
                rotation="0 180 0">
      </a-entity>

      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#fff" intensity="0.6" position="-1 2 1"></a-light>

      <a-entity camera look-controls wasd-controls position="0 1.6 5"></a-entity>

    </a-scene>
    
  </body>
</html>
