<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Axis - Virtual Classroom</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
            <a-asset-item id="classroom-model" src="classroom.glb"></a-asset-item>
        </a-assets>

        <a-entity gltf-model="#classroom-model" position="0 0 0" scale="1 1 1"></a-entity>

        <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
        <a-entity id="rig" position="0 1.6 5">
            <a-camera look-controls wasd-controls></a-camera>
        </a-entity>

        <a-sky color="#ECECEC"></a-sky>
    </a-scene>
</body>
</html>
